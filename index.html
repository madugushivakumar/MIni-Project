<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hostel Hustle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">
<h1>🏫 Hostel Hustle</h1>
<div id="stats">
<span>Energy: <strong id="energyText">100</strong></span>
<span>Hunger: <strong id="hungerText">60</strong></span>
<span>Money: ₹<strong id="moneyText">120</strong></span>
</div>
<div id="text">
You wake up in your hostel room.  
Your first lecture is about to start.  
What will you do today?
</div>
<div id="choiceButtons">
<button id="continueBtn">Continue class</button>
<button id="outBtn">Let's go out</button>
<div id="orderButton">
<button id="orderBtn">Order</button>
</div>
</div>
<button id="nextBtn">Next</button>
<button id="nextBtn1">Next</button>
<button id="nextBtn2">Next</button>

<div id="controls">
<button id="class">Go To Class</button>
<button id="food">Go To Fast Food Center</button>
<button id="hostel">Go To Hostel</button>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
